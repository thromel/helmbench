name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          archive="helmbench-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${archive}"
          cp "target/${{ matrix.target }}/release/helmbench" "dist/${archive}/helmbench"
          cp README.md LICENSE "dist/${archive}/"
          tar -czf "dist/${archive}.tar.gz" -C dist "${archive}"
          (
            cd dist
            if command -v shasum >/dev/null 2>&1; then
              shasum -a 256 "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
            else
              sha256sum "${archive}.tar.gz" > "${archive}.tar.gz.sha256"
            fi
          )

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*.tar.gz"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: helmbench-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.tar.gz \
            dist/*.sha256 \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes
